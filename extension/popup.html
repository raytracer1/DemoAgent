<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:340px;padding:16px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#e0e0e0}
h1{font-size:18px;margin-bottom:4px}
.sub{font-size:12px;color:#888;margin-bottom:12px}
input{width:100%;padding:8px 12px;font-size:13px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#e0e0e0;margin-bottom:8px;outline:none}
input:focus{border-color:#6c5ce7}
.btn{width:100%;padding:10px;font-size:13px;font-weight:600;border:none;border-radius:8px;cursor:pointer;margin-bottom:6px}
.btn-start{background:#6c5ce7;color:#fff}
.btn-stop{background:#ff4757;color:#fff}
.status{font-size:12px;color:#888;margin-top:4px;text-align:center}
.recording-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ff4757;animation:pulse 1s infinite;vertical-align:middle;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style></head>
<body>
<h1>🎬 DemoAgent</h1>

<!-- Idle state -->
<div id="idleView">
  <p class="sub">Create demo video from current tab</p>
  <input type="text" id="goalInput" placeholder="Demo goal" value="create a video in world cup 2026">
  <input type="password" id="apiKeyInput" placeholder="DeepSeek API Key" style="margin-top:4px">
  <button class="btn btn-start" id="startBtn">🚀 Start Demo</button>
</div>

<!-- Recording state -->
<div id="recordingView" style="display:none">
  <p class="sub"><span class="recording-dot"></span>Recording demo...</p>
  <div class="status" id="status">AI is automating the page</div>
  <button class="btn btn-stop" id="stopBtn">⏹ Stop Recording</button>
</div>

<script src="popup.js"></script>
</body>
</html>
