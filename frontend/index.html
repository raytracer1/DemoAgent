<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DemoAgent — Product Demo Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f; color: #e0e0e0; min-height: 100vh;
    display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px;
  }
  .container { max-width: 680px; width: 100%; }
  h1 { font-size: 28px; margin-bottom: 4px; color: #fff; }
  .sub { color: #888; font-size: 15px; margin-bottom: 32px; }

  .card {
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
    padding: 24px; margin-bottom: 20px;
  }
  .card h2 { font-size: 16px; margin-bottom: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }

  label { display: block; font-size: 13px; color: #999; margin-bottom: 6px; margin-top: 12px; }
  label:first-child { margin-top: 0; }
  input[type="text"], input[type="url"] {
    width: 100%; padding: 10px 14px; font-size: 15px;
    background: #111; border: 1px solid #333; border-radius: 8px; color: #e0e0e0;
    outline: none; transition: border-color .2s;
  }
  input:focus { border-color: #6c5ce7; }

  .btn-row { display: flex; gap: 10px; margin-top: 18px; }
  button {
    padding: 10px 22px; font-size: 14px; font-weight: 600; border: none; border-radius: 8px;
    cursor: pointer; transition: all .2s;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: #6c5ce7; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #5a4bd1; }
  .btn-secondary { background: #2a2a2a; color: #ccc; }
  .btn-secondary:hover:not(:disabled) { background: #333; }

  .status-bar {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    background: #111; border: 1px solid #333; border-radius: 8px; margin-top: 14px;
    font-size: 14px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; flex-shrink: 0; }
  .dot.active { background: #6c5ce7; animation: pulse 1.2s infinite; }
  .dot.done { background: #00d2a0; }
  .dot.error { background: #ff4757; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .video-wrap { display: none; margin-top: 16px; }
  .video-wrap.show { display: block; }
  video { width: 100%; border-radius: 8px; border: 1px solid #2a2a2a; }
  .narration-box {
    margin-top: 14px; padding: 14px; background: #111; border: 1px solid #2a2a2a;
    border-radius: 8px; font-size: 14px; line-height: 1.6; color: #bbb; white-space: pre-wrap;
    display: none;
  }
  .narration-box.show { display: block; }

  .error-box {
    margin-top: 14px; padding: 14px; background: #1f0f0f; border: 1px solid #3f1f1f;
    border-radius: 8px; font-size: 14px; color: #ff6b7a; display: none;
  }
  .error-box.show { display: block; }
</style>
</head>
<body>
<div class="container">
  <h1>🎬 DemoAgent</h1>
  <p class="sub">输入 URL 和演示目标，自动生成产品演示视频</p>

  <!-- Login Card -->
  <div class="card">
    <h2>1️⃣ 登录网站（如需要）</h2>
    <label>目标网站 URL</label>
    <input type="url" id="urlInput" placeholder="https://example.com" value="https://i-was-there-psi.vercel.app/">
    <div class="btn-row">
      <button class="btn-secondary" id="loginBtn" onclick="doLogin()">🔐 登录网站</button>
      <span style="font-size:13px;color:#888;align-self:center;" id="loginHint"></span>
    </div>
  </div>

  <!-- Demo Card -->
  <div class="card">
    <h2>2️⃣ 生成演示</h2>
    <label>演示目标</label>
    <input type="text" id="goalInput" placeholder="例如：create a video in world cup 2026" value="create a video in world cup 2026">
    <div class="btn-row">
      <button class="btn-primary" id="generateBtn" onclick="doGenerate()">🚀 生成 Demo</button>
    </div>
    <div id="statusBar" class="status-bar" style="display:none;">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Idle</span>
    </div>
    <div id="errorBox" class="error-box"></div>
    <div id="videoWrap" class="video-wrap">
      <video id="videoPlayer" controls></video>
    </div>
    <div id="narrationBox" class="narration-box"></div>
  </div>
</div>

<script>
const WORKER = localStorage.getItem('worker_url') || 'https://demo-agent-worker.zhengbijun123.workers.dev';
let pollTimer = null;
let sessionId = localStorage.getItem('session_id') || null;

// ── Login ──
async function doLogin() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return alert('请输入 URL');

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 等待登录...';
  document.getElementById('loginHint').textContent = '请在打开的浏览器中登录，最多等待 120 秒';

  try {
    const resp = await fetch(`${WORKER}/api/sessions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    const data = await resp.json();
    sessionId = data.session_id;
    localStorage.setItem('session_id', sessionId);

    // Wait for cookies to be stored (runner handles login)
    let waited = 0;
    while (waited < 130) {
      await sleep(2000); waited += 2;
      // Check if cookies are saved
      try {
        const s = await fetch(`${WORKER}/api/sessions/next-pending`).then(r => r.json());
        if (!s || s.id !== sessionId) {
          document.getElementById('loginHint').textContent = '✅ 登录已完成！';
          btn.textContent = '🔐 登录网站';
          btn.disabled = false;
          return;
        }
      } catch(e) {}
    }
    document.getElementById('loginHint').textContent = '⚠️ 登录超时，请重试';
  } catch(e) {
    document.getElementById('loginHint').textContent = `❌ ${e.message}`;
  }
  btn.textContent = '🔐 登录网站';
  btn.disabled = false;
}

// ── Generate Demo ──
async function doGenerate() {
  const url = document.getElementById('urlInput').value.trim();
  const goal = document.getElementById('goalInput').value.trim();
  if (!url || !goal) return alert('请输入 URL 和目标');

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 处理中...';

  showStatus('active', 'creating job...');

  try {
    const resp = await fetch(`${WORKER}/api/jobs`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, goal, session_id: sessionId }),
    });
    const { job_id } = await resp.json();
    pollJob(job_id);
  } catch(e) {
    showError(e.message);
    btn.disabled = false;
    btn.textContent = '🚀 生成 Demo';
  }
}

// ── Poll job status ──
async function pollJob(jobId) {
  const btn = document.getElementById('generateBtn');
  let attempts = 0;

  pollTimer = setInterval(async () => {
    attempts++;
    try {
      const resp = await fetch(`${WORKER}/api/jobs/${jobId}`);
      const job = await resp.json();
      const status = job.status;

      if (status === 'extracting') showStatus('active', '📄 提取页面元素...');
      else if (status === 'planning') showStatus('active', '🧠 AI 规划操作步骤...');
      else if (status === 'ready') showStatus('active', '▶️ 执行浏览器操作...');
      else if (status === 'running') showStatus('active', '🎥 录制屏幕...');
      else if (status === 'narrating') showStatus('active', '🎤 生成旁白...');
      else if (status === 'done') {
        clearInterval(pollTimer);
        showStatus('done', '✅ 完成！');
        showVideo(jobId);
        if (job.narration) showNarration(job.narration);
        btn.disabled = false;
        btn.textContent = '🚀 生成 Demo';
      } else if (status === 'error') {
        clearInterval(pollTimer);
        showStatus('error', '❌ 失败');
        showError(job.error || 'Unknown error');
        btn.disabled = false;
        btn.textContent = '🚀 生成 Demo';
      }
    } catch(e) {
      if (attempts > 60) {
        clearInterval(pollTimer);
        showError('Job polling timeout');
        btn.disabled = false;
        btn.textContent = '🚀 生成 Demo';
      }
    }
  }, 2000);
}

// ── UI helpers ──
function showStatus(state, text) {
  const bar = document.getElementById('statusBar');
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  bar.style.display = 'flex';
  dot.className = 'dot';
  if (state === 'active') dot.classList.add('active');
  if (state === 'done') dot.classList.add('done');
  if (state === 'error') dot.classList.add('error');
  txt.textContent = text;
}

function showVideo(jobId) {
  const wrap = document.getElementById('videoWrap');
  const vid = document.getElementById('videoPlayer');
  vid.src = `${WORKER}/api/video/${jobId}`;
  wrap.classList.add('show');
}

function showNarration(text) {
  const box = document.getElementById('narrationBox');
  box.textContent = '📝 ' + text;
  box.classList.add('show');
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = '❌ ' + msg;
  box.classList.add('show');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Set worker URL
if (!localStorage.getItem('worker_url')) {
  const u = prompt('Worker URL (default: http://localhost:8787):', 'http://localhost:8787');
  if (u) localStorage.setItem('worker_url', u);
}
</script>
</body>
</html>
